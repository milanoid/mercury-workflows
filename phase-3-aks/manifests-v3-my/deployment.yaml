---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.12.3 
          ports:
            - containerPort: 5678
          envFrom:
            - secretRef:
                name: n8n-configmap
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc
